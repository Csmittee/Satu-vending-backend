# ════════════════════════════════════════════════════════════════════════════
#  SATU — Cloudflare Workers Configuration
#  File: wrangler.toml
#
#  HTML pages served at their filename path:
#    public/simulator.html              → /simulator
#    public/satu-system-tester.html     → /satu-system-tester
#    public/satu-machine-builder.html   → /satu-machine-builder
#    public/satu-preflight.html         → /satu-preflight
#    public/satu-admin.html             → /satu-admin
#    (simulator_r3.html DELETED 2026-06-13)
#
#  SECRETS (set via `npx wrangler secret put <n>` — never commit these):
#    JWT_SECRET           — signs temple owner JWTs (random 32+ char string)
#    ADMIN_SECRET         — X-Admin-Token for admin dashboard access
#    ADMIN_PATH           — custom path for admin dashboard (default: /admin)
#    OMISE_SECRET_KEY     — Omise API key (pkey_test_... for test mode)
#    OMISE_WEBHOOK_SECRET — Omise webhook signing secret (from Omise dashboard)
#    PAYMENT_MODE         — 'fake' for dev/test, 'live' for real hardware only
#    ENVIRONMENT          — 'production' or 'development'
# ════════════════════════════════════════════════════════════════════════════

name                 = "satu-api"
main                 = "src/index.js"
compatibility_date   = "2024-04-01"
compatibility_flags  = ["nodejs_compat"]
workers_dev          = true

# ── Custom Domain Route ───────────────────────────────────────────────────────
# MUST be top-level — never inside [[d1_databases]] or any other section (R-97)
routes = [
  { pattern = "api.janishammer.com/*", zone_name = "janishammer.com" }
]

# ── Static Assets ─────────────────────────────────────────────────────────────
# HTML files in ./public/ are served at their filename path automatically.
# The Worker fetch() handler handles /v1/* API routes.
# Cloudflare serves static assets first; if no match, falls through to Worker.
# This eliminates all GitHub raw fetches and CORS issues for HTML test pages.
[assets]
directory = "./public"
binding   = "ASSETS"

# ── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "satu_db"
database_id   = "be41fa29-3310-423f-bb18-1e4c6f8480c8"

# ── Cron Triggers ─────────────────────────────────────────────────────────────
[triggers]
crons = ["*/30 * * * *"]

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true
