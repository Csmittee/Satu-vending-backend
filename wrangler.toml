name = "satu-api"
main = "src/index.js"
compatibility_date = "2024-04-01"

[[d1_databases]]
binding = "DB"
database_name = "satu_db"
database_id = "YOUR_DATABASE_ID"  # Replace after creating D1

[env.production]
vars = { ENVIRONMENT = "production" }
[env.production.secrets]
OMISE_SECRET_KEY = ""
JWT_SECRET = ""
ADMIN_EMAIL = ""
ADMIN_PASSWORD_HASH = ""

[env.staging]
vars = { ENVIRONMENT = "staging" }
