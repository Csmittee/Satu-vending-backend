<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satu System Tester - Complete Integration Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        
        /* Test Grid */
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .test-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a3e;
        }
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a3e;
        }
        .test-title {
            font-weight: bold;
            color: #667eea;
        }
        .test-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: #2a2a3e; color: #888; }
        .status-pass { background: #10b98120; color: #10b981; border: 1px solid #10b981; }
        .status-fail { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
        .status-running { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }
        
        .test-detail {
            font-size: 13px;
            color: #aaa;
            margin: 10px 0;
            font-family: monospace;
        }
        .test-response {
            background: #0a0a12;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }
        button {
            background: #2a2a3e;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            margin-top: 10px;
            margin-right: 10px;
        }
        button:hover { background: #3a3a4e; }
        .btn-primary { background: #667eea; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        
        .summary-bar {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-stats {
            display: flex;
            gap: 20px;
        }
        .summary-stat {
            text-align: center;
        }
        .summary-number {
            font-size: 24px;
            font-weight: bold;
        }
        .summary-label {
            font-size: 12px;
            color: #888;
        }
        
        .config-area {
            background: #0a0a12;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .config-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .config-row label {
            width: 120px;
            font-size: 13px;
        }
        input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            padding: 8px;
            border-radius: 6px;
            color: white;
        }
        
        .log-area {
            background: #0a0a12;
            border-radius: 8px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #1a1a2e; }
        .log-pass { color: #10b981; }
        .log-fail { color: #ef4444; }
        .log-info { color: #f59e0b; }
        
        .checklist {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #2a2a3e;
        }
        .checklist-icon {
            width: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Satu System Tester</h1>
        <div class="subtitle">Complete Integration Test - Your 10 Checkpoints</div>
        
        <!-- Config -->
        <div class="config-area">
            <div class="config-row">
                <label>Worker URL:</label>
                <input type="text" id="apiUrl" value="https://api.janishammer.com" placeholder="https://api.janishammer.com">
            </div>
            <div class="config-row">
                <label>Test Device ID:</label>
                <input type="text" id="deviceId" value="SATU-TEST001">
            </div>
            <div class="config-row">
                <label>Test Mode:</label>
                <select id="testMode">
                    <option value="fake">Fake Payment (No Omise)</option>
                    <option value="omise_test">Omise Test Mode (Requires API Key)</option>
                </select>
            </div>
        </div>
        
        <!-- Summary -->
        <div class="summary-bar">
            <div class="summary-stats">
                <div class="summary-stat">
                    <div class="summary-number" id="passCount">0</div>
                    <div class="summary-label">Passed</div>
                </div>
                <div class="summary-stat">
                    <div class="summary-number" id="failCount">0</div>
                    <div class="summary-label">Failed</div>
                </div>
                <div class="summary-stat">
                    <div class="summary-number" id="totalCount">0</div>
                    <div class="summary-label">Total Tests</div>
                </div>
            </div>
            <div>
                <button id="runAllBtn" class="btn-primary">▶ Run All Tests</button>
                <button id="resetBtn">Reset</button>
            </div>
        </div>
        
        <!-- Test Grid -->
        <div class="test-grid" id="testGrid"></div>
        
        <!-- Checklist Results -->
        <div class="checklist">
            <h3>✅ Your 10 Checkpoints</h3>
            <div id="checklist"></div>
        </div>
        
        <!-- Log -->
        <div class="log-area" id="logArea">
            <div class="log-entry log-info">Ready. Click "Run All Tests" to begin.</div>
        </div>
    </div>
    
    <script>
        // ============================================
        // TEST DEFINITIONS - Your 10 Checkpoints
        // ============================================
           // Fake Omise Worker URL
        const FAKE_OMISE_URL = 'https://fake-omise.csmittee.workers.dev';
        const tests = [
            {
                id: 1,
                name: "Machine → Backend Call",
                description: "Can my backend receive a call from the machine?",
                checkpoint: "POST /v1/machine/hello",
                run: async (apiUrl, deviceId, mode) => {
                    const res = await fetch(`${apiUrl}/v1/machine/hello`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mac: `TEST:MAC:${Date.now()}`, firmware: 'v1.0.0' })
                    });
                    const data = await res.json();
                    return {
                        passed: res.ok && (data.status === 'pending' || data.status === 'active'),
                        message: `Response: ${JSON.stringify(data)}`,
                        data: data
                    };
                }
            },
            {
                id: 2,
                name: "Backend → Machine Response",
                description: "Did my backend respond to the machine correctly?",
                checkpoint: "Returns valid JSON with status",
                run: async (apiUrl, deviceId, mode) => {
                    const res = await fetch(`${apiUrl}/v1/machine/hello`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mac: `TEST:MAC:${Date.now()}`, firmware: 'v1.0.0' })
                    });
                    const data = await res.json();
                    const hasValidResponse = data && (data.status !== undefined || data.setup_code !== undefined);
                    return {
                        passed: res.ok && hasValidResponse,
                        message: `Response status: ${res.status}, body: ${JSON.stringify(data)}`,
                        data: data
                    };
                }
            },
            {
                id: 3,
                name: "Backend → Omise Communication",
                description: "Does backend talk to Omise (or fake payment)?",
                checkpoint: "Create order → returns QR code",
                run: async (apiUrl, deviceId, mode) => {
                    const res = await fetch(`${apiUrl}/v1/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_id: deviceId, product_id: 3 })
                    });
                    const data = await res.json();
                    const hasQr = data.qr_code_url !== undefined;
                    return {
                        passed: res.ok && hasQr,
                        message: hasQr ? `QR received: ${data.qr_code_url.substring(0, 50)}...` : `Response: ${JSON.stringify(data)}`,
                        data: data,
                        orderId: data.order_id
                    };
                }
            },
            {
                id: 4,
                name: "QR Code → Backend → Machine",
                description: "Did Omise pass QR to backend, then to machine correctly?",
                checkpoint: "Order contains qr_code_url",
                run: async (apiUrl, deviceId, mode) => {
                    const res = await fetch(`${apiUrl}/v1/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_id: deviceId, product_id: 3 })
                    });
                    const data = await res.json();
                    return {
                        passed: data.qr_code_url !== undefined && data.qr_code_url !== null,
                        message: data.qr_code_url ? `QR URL valid` : `No QR in response`,
                        data: data
                    };
                }
            },
            {
                id: 5,
                name: "Backend Receives Donor Name",
                description: "Does backend get donor name when provided?",
                checkpoint: "POST /v1/order with donor_name field",
                run: async (apiUrl, deviceId, mode) => {
                    const testName = "Test Donor Somchai";
                    const res = await fetch(`${apiUrl}/v1/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_id: deviceId, product_id: 1, donor_name: testName })
                    });
                    const data = await res.json();
                    return {
                        passed: res.ok,
                        message: `Donor name "${testName}" sent, order created: ${data.order_id}`,
                        data: data
                    };
                }
            },
            {
                id: 6,
                name: "Backend Saves Donor Name",
                description: "Does backend save donor name to database?",
                checkpoint: "Order can be retrieved with donor_name",
                run: async (apiUrl, deviceId, mode) => {
                    const testName = "Save Test " + Date.now();
                    const createRes = await fetch(`${apiUrl}/v1/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_id: deviceId, product_id: 1, donor_name: testName })
                    });
                    const order = await createRes.json();
                    
                    if (!order.order_id) {
                        return { passed: false, message: "Failed to create order" };
                    }
                    
                    const statusRes = await fetch(`${apiUrl}/v1/order/${order.order_id}/status`);
                    const statusData = await statusRes.json();
                    
                    return {
                        passed: statusRes.ok,
                        message: `Order ${order.order_id} created with donor name`,
                        data: statusData
                    };
                }
            },
                    {
                id: 7,
                name: "Omise Payment Approval",
                description: "Does Omise give approval when payment succeeds?",
                checkpoint: "Webhook receives charge.successful",
                run: async (apiUrl, deviceId, mode) => {
                    if (mode === 'fake') {
                        // Create order
                        const orderRes = await fetch(`${apiUrl}/v1/order`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ device_id: deviceId, product_id: 1 })
                        });
                        const order = await orderRes.json();
                        
                        if (order.order_id && order.omise_charge_id) {
                            // Call Fake Omise to trigger webhook
                            const simRes = await fetch(`${FAKE_OMISE_URL}/simulate-payment`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ 
                                    order_id: order.order_id, 
                                    charge_id: order.omise_charge_id 
                                })
                            });
                            const result = await simRes.json();
                            const webhookOk = result.webhook_response && 
                                (result.webhook_response.status === 'ok' || 
                                 result.webhook_response.order_id !== undefined ||
                                 result.webhook_response.success === true);
                            return {
                                passed: simRes.ok && webhookOk,
                                message: simRes.ok && webhookOk
                                    ? `[FAKE MODE] Webhook received by backend for order ${order.order_id}`
                                    : `[FAKE MODE] Fake Omise OK but backend webhook failed: ${JSON.stringify(result.webhook_response)}`,
                                data: result
                            };
                        }
                        return { passed: false, message: "Could not create order or missing charge_id" };
                    } else {
                        return { passed: true, message: "Omise test mode - requires webhook setup", skipped: true };
                    }
                }
            },
                       {
                id: 8,
                name: "Door Unlock on Payment Success",
                description: "Does door open when Omise payment passes?",
                checkpoint: "payment_confirmed command added to queue",
                run: async (apiUrl, deviceId, mode) => {
                    // Create order
                    const orderRes = await fetch(`${apiUrl}/v1/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_id: deviceId, product_id: 1 })
                    });
                    const order = await orderRes.json();
                    
                    if (!order.order_id || !order.omise_charge_id) {
                        return { passed: false, message: "Failed to create order or missing charge_id" };
                    }
                    
                    // Call Fake Omise to trigger webhook
                    await fetch(`${FAKE_OMISE_URL}/simulate-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            order_id: order.order_id, 
                            charge_id: order.omise_charge_id 
                        })
                    });
                    
                    // Wait for webhook to process
                   // Poll with retry — webhook processing can take 1-3 seconds across workers
                    let commands = { commands: [] };
                    let hasPaymentCommand = false;
                    for (let attempt = 0; attempt < 6; attempt++) {
                        await new Promise(r => setTimeout(r, 800));
                        const cmdRes = await fetch(`${apiUrl}/v1/machine/commands?device_id=${deviceId}`);
                        commands = await cmdRes.json();
                        hasPaymentCommand = commands.commands && commands.commands.some(c => c.command === 'payment_confirmed');
                        if (hasPaymentCommand) break;
                    }
                    
                    return {
                        passed: hasPaymentCommand,
                        message: hasPaymentCommand ? `✅ payment_confirmed command found` : `No payment command in queue`,
                        data: commands
                    };
                }
            },
            {
                id: 9,
                name: "Door Stays Locked on Payment Fail",
                description: "Does door stay closed when payment fails?",
                checkpoint: "No unlock command when payment fails",
                run: async (apiUrl, deviceId, mode) => {
                    // Create a real order, then simulate a FAILED payment
                    const orderRes = await fetch(`${apiUrl}/v1/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_id: deviceId, product_id: 1 })
                    });
                    const order = await orderRes.json();

                    if (!order.order_id || !order.omise_charge_id) {
                        return { passed: false, message: "Failed to create order for failure test" };
                    }

                    // Trigger failed payment webhook
                    await fetch(`${FAKE_OMISE_URL}/simulate-failed-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            order_id: order.order_id,
                            charge_id: order.omise_charge_id,
                            reason: 'insufficient_funds'
                        })
                    });

                    // Wait for processing
                    await new Promise(r => setTimeout(r, 1500));

                    const cmdRes = await fetch(`${apiUrl}/v1/machine/commands?device_id=${deviceId}`);
                    const commands = await cmdRes.json();
                    const hasUnlock = commands.commands && commands.commands.some(c => c.command === 'payment_confirmed');

                    return {
                        passed: !hasUnlock,
                        message: !hasUnlock
                            ? `✅ Door stays locked — no unlock command after failed payment`
                            : `❌ BUG: Unlock command found after failed payment!`,
                        data: commands
                    };
                }
            },
                    {
                id: 10,
                name: "Door Unlock on Payment Pass",
                description: "Does door open correctly when payment passes?",
                checkpoint: "Command queue contains payment_confirmed",
                run: async (apiUrl, deviceId, mode) => {
                    // Create and pay for order
                    const orderRes = await fetch(`${apiUrl}/v1/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_id: deviceId, product_id: 1 })
                    });
                    const order = await orderRes.json();
                    
                    if (!order.order_id || !order.omise_charge_id) {
                        return { passed: false, message: "Failed to create order or missing charge_id" };
                    }
                    
                    // Call Fake Omise to trigger webhook
                    await fetch(`${FAKE_OMISE_URL}/simulate-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            order_id: order.order_id, 
                            charge_id: order.omise_charge_id 
                        })
                    });
                    
                    // Wait for webhook to process
                    // Poll with retry — webhook processing can take 1-3 seconds across workers
                    let commands = { commands: [] };
                    let hasUnlock = false;
                    for (let attempt = 0; attempt < 6; attempt++) {
                        await new Promise(r => setTimeout(r, 800));
                        const cmdRes = await fetch(`${apiUrl}/v1/machine/commands?device_id=${deviceId}`);
                        commands = await cmdRes.json();
                        hasUnlock = commands.commands && commands.commands.some(c => c.command === 'payment_confirmed');
                        if (hasUnlock) break;
                    }
                    
                    return {
                        passed: hasUnlock,
                        message: hasUnlock ? `✅ Door unlock command sent` : `❌ No unlock command found`,
                        data: commands
                    };
                }
            }
        ];
        
        // State
        let testResults = {};
        let logs = [];
        
        // Helper functions
        function addLog(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            const logDiv = document.createElement('div');
            logDiv.className = `log-entry log-${type}`;
            logDiv.innerHTML = `[${time}] ${message}`;
            logArea.insertBefore(logDiv, logArea.firstChild);
            if (logArea.children.length > 50) logArea.removeChild(logArea.lastChild);
            logs.push({ time, message, type });
        }
        
        function updateSummary() {
            const results = Object.values(testResults);
            const passed = results.filter(r => r === true).length;
            const failed = results.filter(r => r === false).length;
            document.getElementById('passCount').innerText = passed;
            document.getElementById('failCount').innerText = failed;
            document.getElementById('totalCount').innerText = results.length;
        }
        
        function updateChecklist() {
            const checklistDiv = document.getElementById('checklist');
            const checkpoints = [
                "1. Machine → Backend call",
                "2. Backend → Machine response",
                "3. Backend → Omise communication",
                "4. QR Code → Backend → Machine",
                "5. Backend receives donor name",
                "6. Backend saves donor name",
                "7. Omise payment approval",
                "8. Door unlock on payment success",
                "9. Door stays locked on payment fail",
                "10. Door unlock on payment pass"
            ];
            
            let html = '';
            for (let i = 0; i < checkpoints.length; i++) {
                const result = testResults[i + 1];
                let icon = '⏳';
                let color = '#888';
                if (result === true) { icon = '✅'; color = '#10b981'; }
                if (result === false) { icon = '❌'; color = '#ef4444'; }
                html += `
                    <div class="checklist-item">
                        <div class="checklist-icon" style="color:${color}">${icon}</div>
                        <div>${checkpoints[i]}</div>
                    </div>
                `;
            }
            checklistDiv.innerHTML = html;
        }
        
        async function runSingleTest(test, apiUrl, deviceId, mode) {
            const testCard = document.getElementById(`test-${test.id}`);
            const statusSpan = testCard?.querySelector('.test-status');
            const responseDiv = testCard?.querySelector('.test-response');
            
            if (statusSpan) {
                statusSpan.className = 'test-status status-running';
                statusSpan.textContent = '● Running';
            }
            if (responseDiv) responseDiv.innerHTML = 'Running test...';
            
            addLog(`Running: ${test.name}`, 'info');
            
            try {
                const result = await test.run(apiUrl, deviceId, mode);
                testResults[test.id] = result.passed;
                
                if (statusSpan) {
                    statusSpan.className = `test-status ${result.passed ? 'status-pass' : 'status-fail'}`;
                    statusSpan.textContent = result.passed ? '✓ Passed' : '✗ Failed';
                }
                if (responseDiv) {
                    responseDiv.innerHTML = `<strong>Result:</strong> ${result.message}<br><strong>Response:</strong> ${JSON.stringify(result.data || {}, null, 2)}`;
                }
                
                addLog(`${result.passed ? '✓ PASS' : '✗ FAIL'}: ${test.name} - ${result.message}`, result.passed ? 'pass' : 'fail');
                
                return result;
            } catch (error) {
                testResults[test.id] = false;
                if (statusSpan) {
                    statusSpan.className = 'test-status status-fail';
                    statusSpan.textContent = '✗ Error';
                }
                if (responseDiv) {
                    responseDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
                }
                addLog(`✗ ERROR: ${test.name} - ${error.message}`, 'fail');
                return { passed: false, message: error.message };
            } finally {
                updateSummary();
                updateChecklist();
            }
        }
        
        async function runAllTests() {
            const apiUrl = document.getElementById('apiUrl').value;
            const deviceId = document.getElementById('deviceId').value;
            const mode = document.getElementById('testMode').value;
            
            addLog(`Starting all tests against ${apiUrl}`, 'info');
            addLog(`Test mode: ${mode}`, 'info');
            
            // Reset results
            testResults = {};
            updateSummary();
            
            // Run each test sequentially
            for (const test of tests) {
                await runSingleTest(test, apiUrl, deviceId, mode);
                await new Promise(r => setTimeout(r, 500)); // Small delay between tests
            }
            
            addLog(`All tests completed. ${Object.values(testResults).filter(v => v === true).length} passed, ${Object.values(testResults).filter(v => v === false).length} failed`, 'info');
        }
        
        function renderTestGrid() {
            const grid = document.getElementById('testGrid');
            grid.innerHTML = tests.map(test => `
                <div class="test-card" id="test-${test.id}">
                    <div class="test-header">
                        <span class="test-title">${test.id}. ${test.name}</span>
                        <span class="test-status status-pending">● Pending</span>
                    </div>
                    <div class="test-detail">${test.description}</div>
                    <div class="test-detail" style="color:#667eea;">Checkpoint: ${test.checkpoint}</div>
                    <div class="test-response" id="response-${test.id}">Not yet tested</div>
                    <button onclick="runSingleTestFromId(${test.id})">Run This Test</button>
                </div>
            `).join('');
        }
        
        window.runSingleTestFromId = async function(testId) {
            const apiUrl = document.getElementById('apiUrl').value;
            const deviceId = document.getElementById('deviceId').value;
            const mode = document.getElementById('testMode').value;
            const test = tests.find(t => t.id === testId);
            if (test) {
                await runSingleTest(test, apiUrl, deviceId, mode);
            }
        };
        
        // Initialize
        renderTestGrid();
        document.getElementById('runAllBtn').onclick = runAllTests;
        document.getElementById('resetBtn').onclick = () => {
            testResults = {};
            updateSummary();
            updateChecklist();
            renderTestGrid();
            addLog('Reset complete', 'info');
        };
    </script>
</body>
</html>
