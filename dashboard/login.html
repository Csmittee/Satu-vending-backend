<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Satu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sarabun', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #333;
            font-size: 2rem;
        }
        .login-container h2 {
            text-align: center;
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 1.5rem;
            font-weight: normal;
        }
        .form-group { margin-bottom: 1rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        button:hover { background: #5a67d8; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        .error {
            background: #fff5f5;
            color: #c53030;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
            border: 1px solid #fed7d7;
            font-size: 0.9rem;
        }
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🙏 Satu</h1>
        <h2>เข้าสู่ระบบ</h2>
        <div id="error" class="error" style="display: none;"></div>
        <div class="form-group">
            <label>อีเมล</label>
            <input type="email" id="email" placeholder="admin@wat.com" required>
        </div>
        <div class="form-group">
            <label>รหัสผ่าน</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
        <div class="register-link">
            ยังไม่มีบัญชี? <a href="/register.html">สมัครสมาชิก</a>
        </div>
    </div>

    <script>
        // ── CORRECT API URL ───────────────────────────────────────────────────
        // Previous version pointed at api.satu-th.com (wrong domain).
        // Correct domain is api.janishammer.com.
        const API_URL = 'https://api.janishammer.com/v1';

        // Redirect if already logged in
        const existingToken = localStorage.getItem('jwt_token');
        if (existingToken) {
            window.location.href = '/dashboard/index.html';
        }

        async function doLogin() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('error');

            errorDiv.style.display = 'none';

            if (!email || !password) {
                showError('กรุณากรอกอีเมลและรหัสผ่าน');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'กำลังเข้าสู่ระบบ...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    // 401 = wrong credentials, 429 = too many attempts
                    if (response.status === 429) {
                        showError('พยายามเข้าสู่ระบบบ่อยเกินไป กรุณารอสักครู่');
                    } else {
                        showError('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
                    }
                    return;
                }

                // Store token and user info
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('satu_user', JSON.stringify(data.user));

                // Redirect to dashboard
                window.location.href = '/dashboard/index.html';

            } catch (err) {
                showError('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่');
                console.error('[login]', err);
            } finally {
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
